etcd:
  endpoints:
    - "http://etcd:2379"
  prefix: "/aisix"
  dial_timeout_ms: 5000
  request_timeout_ms: 5000

proxy:
  addr: "0.0.0.0:3000"
  request_body_limit_bytes: 52428800  # 50 MiB

admin:
  addr: "0.0.0.0:3001"
  admin_keys:
    - "${GATEWAY_ADMIN_KEY}"

observability:
  service_name: "aisix"
  log_level: "info"
  access_log: true
  metrics:
    prometheus:
      enabled: true
      path: "/metrics"
      addr: "0.0.0.0:9090"

cache:
  backend: "memory"

ratelimit:
  backend: "memory"
